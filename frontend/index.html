<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SprintHub — Workspace Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #18181f;
    --surface: #1e1e28;
    --surface2: #252530;
    --border: #2a2a38;
    --border2: #353548;
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #5a5a72;
    --accent: #7c3aed;
    --accent2: #9333ea;
    --accent-bg: #1e1028;
    --green: #22c55e;
    --green-bg: #0f2a1a;
    --yellow: #f59e0b;
    --yellow-bg: #2a1f0a;
    --red: #ef4444;
    --red-bg: #2a0f0f;
    --blue: #3b82f6;
    --blue-bg: #0f1a2a;
    --purple: #a855f7;
    --teal: #14b8a6;
    --pink: #ec4899;
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
  a { color: inherit; text-decoration: none; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* Layout */
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; min-height: 100vh; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; transition: transform 0.2s; }
  .main { margin-left: 240px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
  .topbar { height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; position: sticky; top: 0; z-index: 50; }
  .page { padding: 28px 32px; flex: 1; max-width: 1200px; }

  /* Auth */
  .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
  .auth-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; width: 400px; }
  .auth-logo { font-size: 22px; font-weight: 600; color: var(--accent2); margin-bottom: 8px; letter-spacing: -0.5px; }
  .auth-sub { color: var(--text2); font-size: 13px; margin-bottom: 32px; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 28px; background: var(--bg3); border-radius: var(--radius-sm); padding: 4px; }
  .auth-tab { flex: 1; text-align: center; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.15s; }
  .auth-tab.active { background: var(--surface); color: var(--text); }

  /* Forms */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.3px; }
  input, select, textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder, textarea::placeholder { color: var(--text3); }
  select option { background: var(--bg3); }
  textarea { resize: vertical; min-height: 80px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; outline: none; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface); color: var(--text); border-color: var(--border2); }
  .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid #3a1515; }
  .btn-danger:hover { background: #3a1515; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; padding: 11px 16px; font-size: 14px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .icon-btn { background: transparent; border: none; color: var(--text2); cursor: pointer; padding: 6px; border-radius: var(--radius-sm); display: flex; align-items: center; transition: all 0.15s; }
  .icon-btn:hover { background: var(--surface); color: var(--text); }

  /* Sidebar */
  .sidebar-logo { padding: 20px 20px 16px; font-size: 18px; font-weight: 600; color: var(--accent2); letter-spacing: -0.5px; border-bottom: 1px solid var(--border); }
  .sidebar-logo span { color: var(--text3); font-weight: 400; font-size: 14px; margin-left: 4px; }
  .sidebar-section { padding: 16px 12px 8px; }
  .sidebar-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); transition: all 0.15s; font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active { background: var(--accent-bg); color: var(--accent2); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }
  .user-chip { display: flex; align-items: center; gap: 10px; }
  .badge { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .badge-lg { width: 40px; height: 40px; font-size: 14px; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text3); }

  /* Cards */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-sm { padding: 14px 16px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
  .stat-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 600; letter-spacing: -1px; }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-todo { background: var(--surface); color: var(--text2); }
  .badge-in_progress { background: var(--blue-bg); color: var(--blue); }
  .badge-in_review { background: var(--yellow-bg); color: var(--yellow); }
  .badge-done { background: var(--green-bg); color: var(--green); }
  .badge-low { background: var(--surface); color: var(--text2); }
  .badge-medium { background: var(--blue-bg); color: var(--blue); }
  .badge-high { background: var(--yellow-bg); color: var(--yellow); }
  .badge-urgent { background: var(--red-bg); color: var(--red); }
  .badge-admin { background: var(--accent-bg); color: var(--accent2); }
  .badge-member { background: var(--surface); color: var(--text2); }
  .badge-overdue { background: var(--red-bg); color: var(--red); }

  /* Workspace Cards */
  .workspaces-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .workspace-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: all 0.15s; }
  .workspace-card:hover { border-color: var(--border2); background: var(--bg3); }
  .workspace-color-bar { width: 36px; height: 4px; border-radius: 2px; margin-bottom: 14px; }
  .workspace-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .workspace-desc { font-size: 12px; color: var(--text2); margin-bottom: 16px; line-height: 1.5; min-height: 18px; }
  .workspace-meta { display: flex; align-items: center; gap: 12px; }
  .meta-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text3); }
  .meta-item svg { width: 13px; height: 13px; }

  /* Work Item Items */
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; transition: all 0.15s; }
  .item-item:hover { border-color: var(--border2); }
  .item-check { width: 16px; height: 16px; border: 1.5px solid var(--border2); border-radius: 4px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
  .item-check.done { background: var(--green); border-color: var(--green); }
  .item-content { flex: 1; min-width: 0; }
  .item-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .item-title.done { text-decoration: line-through; color: var(--text3); }
  .item-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .item-assignee { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .item-due { font-size: 11px; color: var(--text3); }
  .item-due.overdue { color: var(--red); }

  /* Kanban */
  .kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; overflow-x: auto; }
  .kanban-col { background: var(--bg3); border-radius: var(--radius); padding: 14px; min-width: 220px; }
  .kanban-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .kanban-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); }
  .kanban-count { background: var(--surface); color: var(--text3); font-size: 11px; padding: 1px 7px; border-radius: 20px; }
  .kanban-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
  .kanban-card:hover { border-color: var(--accent); }
  .kanban-card-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
  .kanban-card-footer { display: flex; align-items: center; justify-content: space-between; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .modal-title { font-size: 17px; font-weight: 600; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* Page headers */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .page-title { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
  .page-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; background: var(--bg3); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px; width: fit-content; }
  .tab { padding: 6px 14px; border-radius: 5px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .tab.active { background: var(--surface); color: var(--text); }

  /* Activity */
  .activity-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .activity-item:last-child { border-bottom: none; }
  .activity-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 4px; flex-shrink: 0; }
  .activity-text { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .activity-time { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* Alerts */
  .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; }
  .alert-error { background: var(--red-bg); color: var(--red); border: 1px solid #3a1515; }
  .alert-success { background: var(--green-bg); color: var(--green); border: 1px solid #0f3a1a; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; }
  .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }
  .empty-title { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
  .empty-sub { font-size: 13px; color: var(--text2); }

  /* Loading */
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-center { display: flex; align-items: center; justify-content: center; padding: 60px; }

  /* Divider */
  hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* Colors bar for workspace */
  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
  .color-dot.selected { border-color: var(--text); transform: scale(1.1); }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .kanban { grid-template-columns: repeat(2, minmax(200px, 1fr)); }
    .page { padding: 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .flex { display: flex; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .mt-1 { margin-top: 4px; }
  .mt-2 { margin-top: 8px; }
  .mb-2 { margin-bottom: 8px; }
  .mb-4 { margin-bottom: 16px; }
  .text-sm { font-size: 12px; }
  .text-muted { color: var(--text2); }
  .fw-500 { font-weight: 500; }
  .fw-600 { font-weight: 600; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useCallback, useRef } = React;

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API = (window.API_BASE_URL || 'http://localhost:8000') + '/api/v1';

// ─── API HELPERS ──────────────────────────────────────────────────────────────
const getToken = () => localStorage.getItem('access_token');

async function apiFetch(path, opts = {}) {
  const token = getToken();
  const res = await fetch(API + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: 'Bearer ' + token } : {}),
      ...opts.headers,
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: 'Request failed' }));
    const msg = typeof err.detail === 'string' ? err.detail : JSON.stringify(err.detail) || 'Request failed';
    throw new Error(msg);
  }
  if (res.status === 204) return null;
  return res.json();
}

// ─── ICONS ───────────────────────────────────────────────────────────────────
const Icon = ({ d, size = 16 }) => React.createElement('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.75, strokeLinecap: 'round', strokeLinejoin: 'round' }, React.createElement('path', { d }));

const Icons = {
  dashboard: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6',
  workspace: 'M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z',
  item: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4',
  user: 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z',
  plus: 'M12 4v16m8-8H4',
  x: 'M6 18L18 6M6 6l12 12',
  check: 'M5 13l4 4L19 7',
  edit: 'M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z',
  trash: 'M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16',
  logout: 'M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1',
  users: 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z',
  calendar: 'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z',
  menu: 'M4 6h16M4 12h16M4 18h16',
  chart: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z',
  arrow: 'M9 5l7 7-7 7',
  remark: 'M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z',
};

// ─── UTILS ────────────────────────────────────────────────────────────────────
const PROJECT_COLORS = ['#6c63ff','#ec4899','#f59e0b','#22c55e','#3b82f6','#14b8a6','#a855f7','#ef4444'];

function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function Badge({ name, color, size = 'sm' }) {
  const cls = 'badge' + (size === 'lg' ? ' badge-lg' : '');
  return React.createElement('div', { className: cls, style: { background: (color || '#6c63ff') + '33', color: color || '#6c63ff' } }, initials(name));
}

function formatDate(d) {
  if (!d) return null;
  const date = new Date(d);
  return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
}

function timeAgo(d) {
  if (!d) return '';
  const seconds = Math.floor((Date.now() - new Date(d)) / 1000);
  if (seconds < 60) return 'just now';
  if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
  if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
  return Math.floor(seconds / 86400) + 'd ago';
}

function StatusBadge({ status }) {
  const labels = { backlog: 'To Do', active: 'In Progress', review: 'In Review', done: 'Done' };
  return React.createElement('span', { className: 'badge badge-' + status }, labels[status] || status);
}

function PriorityBadge({ priority }) {
  return React.createElement('span', { className: 'badge badge-' + priority }, priority?.charAt(0).toUpperCase() + priority?.slice(1));
}

// ─── AUTH CONTEXT ─────────────────────────────────────────────────────────────
function useAuth() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const token = getToken();
    if (token) {
      apiFetch('/auth/me').then(u => { setUser(u); setLoading(false); }).catch(() => { localStorage.clear(); setLoading(false); });
    } else setLoading(false);
  }, []);

  const login = async (email, password) => {
    const data = await apiFetch('/auth/login', { method: 'POST', body: { email, password } });
    localStorage.setItem('access_token', data.access_token);
    localStorage.setItem('refresh_token', data.refresh_token);
    const u = await apiFetch('/auth/me');
    setUser(u);
  };

  const register = async (display_name, email, password, role) => {
    const data = await apiFetch('/auth/register', { method: 'POST', body: { display_name, email, password, role } });
    localStorage.setItem('access_token', data.access_token);
    localStorage.setItem('refresh_token', data.refresh_token);
    const u = await apiFetch('/auth/me');
    setUser(u);
  };

  const logout = () => { localStorage.clear(); setUser(null); };
  return { user, loading, login, register, logout };
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const { user, loading, login, register, logout } = useAuth();
  const [page, setPage] = useState('dashboard');
  const [selectedWorkspace, setSelectedWorkspace] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  if (loading) return React.createElement('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh' } }, React.createElement('div', { className: 'spinner' }));
  if (!user) return React.createElement(AuthPage, { onLogin: login, onRegister: register });

  const nav = [
    { id: 'dashboard', label: 'Dashboard', icon: Icons.dashboard },
    { id: 'workspaces', label: 'Workspaces', icon: Icons.workspace },
    ...(user.role === 'admin' ? [{ id: 'users', label: 'Users', icon: Icons.user }] : []),
  ];

  const handleNav = (id) => { setPage(id); setSelectedWorkspace(null); setSidebarOpen(false); };
  const handleSelectWorkspace = (p) => { setSelectedWorkspace(p); setPage('workspace-detail'); };

  return React.createElement('div', { className: 'app' },
    sidebarOpen && React.createElement('div', { style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 99 }, onClick: () => setSidebarOpen(false) }),

    React.createElement('div', { className: 'sidebar' + (sidebarOpen ? ' open' : '') },
      React.createElement('div', { className: 'sidebar-logo' }, '🚀 SprintHub', React.createElement('span', null, 'v1')),
      React.createElement('div', { className: 'sidebar-section' },
        React.createElement('div', { className: 'sidebar-label' }, 'Navigation'),
        nav.map(n => React.createElement('div', { key: n.id, className: 'nav-item' + (page === n.id || (page === 'workspace-detail' && n.id === 'workspaces') ? ' active' : ''), onClick: () => handleNav(n.id) },
          React.createElement(Icon, { d: n.icon }),
          n.label
        ))
      ),
      React.createElement('div', { className: 'sidebar-footer' },
        React.createElement('div', { className: 'user-chip' },
          React.createElement(Badge, { name: user.display_name, color: user.badge_color }),
          React.createElement('div', { className: 'user-info' },
            React.createElement('div', { className: 'user-name' }, user.display_name),
            React.createElement('div', { className: 'user-role' }, user.role)
          ),
          React.createElement('button', { className: 'icon-btn', onClick: logout, title: 'Logout' }, React.createElement(Icon, { d: Icons.logout }))
        )
      )
    ),

    React.createElement('div', { className: 'main' },
      React.createElement('div', { className: 'topbar' },
        React.createElement('button', { className: 'icon-btn', style: { display: 'none' }, id: 'menu-btn', onClick: () => setSidebarOpen(true) }, React.createElement(Icon, { d: Icons.menu })),
        React.createElement('div', { style: { fontSize: 14, color: 'var(--text2)', flex: 1 } },
          page === 'workspace-detail' && selectedWorkspace ? '📁 ' + selectedWorkspace.name :
          page === 'dashboard' ? '🏠 Dashboard' :
          page === 'workspaces' ? '📂 Workspaces' : '👥 Users'
        ),
        React.createElement('span', { className: 'badge badge-' + user.role }, user.role)
      ),
      page === 'dashboard' && React.createElement(Dashboard, { user }),
      page === 'workspaces' && React.createElement(WorkspacesPage, { user, onSelectWorkspace: handleSelectWorkspace }),
      page === 'workspace-detail' && selectedWorkspace && React.createElement(WorkspaceDetail, { workspace: selectedWorkspace, user, onBack: () => setPage('workspaces') }),
      page === 'users' && user.role === 'admin' && React.createElement(UsersPage, null)
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
